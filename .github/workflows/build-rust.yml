name: Build Rust Downloader

on:
  push:
    branches: [ "main", "dev" ]
    tags: [ "v*" ]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/build-rust.yml"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout A Repository
        uses: actions/checkout@v4

      - name: Compute Cargo.lock hash
        id: cargo-lock-hash
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f Cargo.lock ]; then
            echo "hash=missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if command -v python3 >/dev/null 2>&1; then
            PYTHON=python3
          else
            PYTHON=python
          fi
          HASH=$($PYTHON -c "import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('Cargo.lock').read_bytes()).hexdigest())")
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            Tomato-Novel-Official-API/target
          key: ${{ runner.os }}-cargo-${{ steps.cargo-lock-hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build --release --no-default-features --features no-official-api

      - name: Bundle artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          out="TomatoNovelDownloader-Win64-${GITHUB_REF_NAME}.exe"
          cp target/release/tomato-novel-downloader.exe "dist/${out}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist

